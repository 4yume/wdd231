<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Project Home Page</title>

    <meta name="author" content="Yumeto Kozuma">
    <meta name="description"
        content="This is a search page that users can search anime by genre. Users also can see the detail for the anime.">

    <!-- favicon link -->
    <link rel="icon" href="images/favicon.ico">

    <!-- social media meta -->
    <meta property="og:title" content="Anime Library">
    <meta property="og:description" content="Explore anime recommentdation based on genres and ratings.">
    <meta property="og:image" content="https://4yume.github.io/wdd231/finalproject/images/site-logo-tv.svg">
    <meta property="og:url" content="https://4yume.github.io/wdd231/finalproject/index.html">

    <!-- style link -->
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">

    <!-- script link -->
    <script type="module" src="scripts/search.js"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&display=swap" rel="stylesheet">
    <!-- -->
</head>

<body>
    <div class="together">
        <header>
            <img src="images/site-logo-tv.svg" alt="Site Logo" width="16" height="16">
            <span>Anime Library</span>
            <button id="ham-btn" class="hamburger">≣</button>
        </header>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li class="current"><a href="search.html">Search</a></li>
                <li><a href="favorite.html">Favorite</a></li>
                <li><a href="survey.html">Survey</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <h1>Search</h1>

        <section class="filter-buttons">
            <button>All</button>
            <button>Action</button>
            <button>Adventure</button>
            <button>Fantasy</button>
            <button>Comedy</button>
            <button>Sports</button>
            <button>Drama</button>
        </section>

        <section id="anime-container"></section>

        <dialog id="anime-modal">
            <button id="close-modal">X</button>

            <h2 id="modal-title"></h2>
            <p id="modal-status"></p>
            <p id="modal-description"></p>

            <button id="favorite-btn">⭐Add to Favorites</button>
        </dialog>
    </main>

    <footer>
        <div class="site">
            <img src="images/facebook.svg" alt="Facebook logo">
            <img src="images/youtube.svg" alt="YouTube logo">
            <img src="images/linkedin.svg" alt="Linkedin logo">
        </div>


        <p>WDD231 Final Project</p>
        <p>Yumeto Kozuma</p>
        <p>©<span id="currentyear"></span> Anime Library</p>
        <p id="lastModified"></p>
        <a href="attribution.html">Attributions</a>

    </footer>
</body>

</html>
