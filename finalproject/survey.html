<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Project Home Page</title>

    <meta name="author" content="Yumeto Kozuma">
    <meta name="description"
        content="This is a form to take a survey. Users need to write their name, email, favorite aime, and favorite genre.">

    <!-- favicon link -->
    <link rel="icon" href="images/favicon.ico">

    <!-- social media meta -->
    <meta property="og:title" content="Anime Library">
    <meta property="og:description" content="Explore anime recommentdation based on genres and ratings.">
    <meta property="og:image" content="https://4yume.github.io/wdd231/finalproject/images/site-logo-tv.svg">
    <meta property="og:url" content="https://4yume.github.io/wdd231/finalproject/index.html">

    <!-- style link -->
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">

    <!-- script link -->
    

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&display=swap" rel="stylesheet">
    <!-- -->
</head>

<body>
    <div class="together">
        <header>
            <img src="images/site-logo-tv.svg" alt="Site Logo" width="16" height="16">
            <span>Anime Library</span>
            <button id="ham-btn" class="hamburger">≣</button>
        </header>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="favorite.html">Favorite</a></li>
                <li class="current"><a href="survey.html">Survey</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <h1>Anime Survey</h1>

        <form method="get" action="thanks.html">
            <div class="form-field">
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" required>
            </div>

            <div class="form-field">
                <label for="email">Email: </label>
                <input type="email" name="email" id="email" required>
            </div>

            <div class="form-field">
                <label for="anime">Favorite Anime: </label>
                <input type="text" name="anime" id="anime" required>
            </div>

            <div class="form-field">
                <label for="genre">Favorite Genre: </label>
                <select name="genre" id="genre" required>
                    <option value="" disabled selected>Select a favorite genre</option>
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventrue</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>

            <div class="form-field">
                <label for="comment">Comments: </label>
                <textarea name="comment" id="comment"></textarea>
            </div>

            <button type="submit">Submit Survey</button>
        </form>
    </main>

    <footer>
        <div class="site">
            <img src="images/facebook.svg" alt="Facebook logo">
            <img src="images/youtube.svg" alt="YouTube logo">
            <img src="images/linkedin.svg" alt="Linkedin logo">
        </div>


        <p>WDD231 Final Project</p>
        <p>Yumeto Kozuma</p>
        <p>©<span id="currentyear"></span> Anime Library</p>
        <p id="lastModified"></p>

    </footer>
</body>

</html>
